name: ML CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Test project imports
        run: |
          python -c "from src.preprocess import load_and_preprocess_data"
          python -c "from src.model import get_model"
          python -c "from src.evaluate import evaluate_model"
